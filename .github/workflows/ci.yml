name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install -r test-requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check XSerialOne/

      - name: Run tests
        run: pytest tests/ -v --tb=short
